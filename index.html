<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Enforcement Vocab Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f2f2f2;
            overflow: hidden; /* Prevent scrolling during gameplay */
            touch-action: manipulation;
        }
        
        /* Kahoot-like button colors and shadows */
        .btn-red { background-color: #e21b3c; box-shadow: 0 4px 0 #b0102a; }
        .btn-blue { background-color: #1368ce; box-shadow: 0 4px 0 #0f51a1; }
        .btn-yellow { background-color: #d89e00; box-shadow: 0 4px 0 #a87b00; }
        .btn-green { background-color: #26890c; box-shadow: 0 4px 0 #1c6409; }
        
        .answer-btn {
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .answer-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent !important;
        }

        .answer-btn:hover {
            filter: brightness(1.1);
        }

        .answer-btn.disabled {
            pointer-events: none;
            opacity: 0.9;
        }

        /* Pure CSS Shapes for buttons */
        .shape-container {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .shape-triangle {
            width: 0; height: 0; 
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 24px solid white;
        }
        .shape-diamond {
            width: 20px; height: 20px; 
            background: white; 
            transform: rotate(45deg);
        }
        .shape-circle {
            width: 24px; height: 24px; 
            background: white; 
            border-radius: 50%;
        }
        .shape-square {
            width: 22px; height: 22px; 
            background: white;
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .timer-bar-container {
            background-color: #ccc;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .timer-bar {
            height: 100%;
            background-color: #333;
            transition: width 0.1s linear, background-color 0.3s;
        }

        /* Background patterns */
        .bg-pattern {
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-pattern">

    <!-- Start Screen -->

                <button onclick="startGame()" class="w-full py-4 text-xl font-bold text-white bg-[#333] rounded-lg hover:bg-black transition-colors shadow-[0_4px_0_#000] active:translate-y-[4px] active:shadow-none">
                    Bắt đầu chơi
                </button>
            </div>
        </div>
    </div>

    <!-- Game Header -->
    <header class="w-full p-4 flex justify-between items-center bg-white shadow-md z-10">
        <div class="font-bold text-xl text-gray-800" id="question-counter">Câu: 1/10</div>
        <div class="font-black text-2xl text-[#46178f] bg-gray-100 px-4 py-1 rounded-full border-2 border-gray-200" id="score-display">0</div>
    </header>

    <!-- Main Game Area -->
    <main class="flex-grow flex flex-col p-4 md:p-8 max-w-5xl mx-auto w-full relative">
        
        <!-- Question Container -->
        <div class="flex-grow flex flex-col items-center justify-center mb-6">
            <div class="bg-white p-6 md:p-10 rounded-xl shadow-lg w-full text-center border-t-8 border-[#46178f]">
                <h2 class="text-3xl md:text-5xl font-extrabold text-gray-800 tracking-wide" id="question-text">Question goes here</h2>
                <p class="text-gray-500 mt-4 font-semibold text-lg" id="question-type-hint">Nghĩa tiếng Việt là gì?</p>
            </div>
            
            <!-- Timer -->
            <div class="w-full mt-6">
                <div class="timer-bar-container">
                    <div id="timer-bar" class="timer-bar w-full"></div>
                </div>
            </div>
        </div>

        <!-- Answers Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-1/2 min-h-[300px]" id="answers-container">
            <!-- Buttons generated by JS -->
        </div>
    </main>

    <!-- Feedback Overlay (Between questions) -->
    <div id="feedback-screen" class="absolute inset-0 flex flex-col items-center justify-center z-40 hidden transition-opacity duration-300">
        <div id="feedback-bg" class="absolute inset-0 bg-opacity-90"></div>
        <div class="z-50 text-center text-white animate-pop">
            <h2 id="feedback-title" class="text-6xl font-black mb-4 drop-shadow-lg">Đúng!</h2>
            <div class="bg-black bg-opacity-30 rounded-full px-8 py-3 inline-block mb-8">
                <p class="text-2xl font-bold">+<span id="feedback-points">0</span> điểm</p>
            </div>
            <div>
                <p class="text-xl mb-2 font-semibold text-white/80">Đáp án đúng là:</p>
                <p id="feedback-correct-answer" class="text-3xl font-extrabold bg-white text-gray-900 px-6 py-2 rounded-lg shadow-xl inline-block"></p>
            </div>
        </div>
    </div>

    <!-- End Game Screen -->
    <div id="end-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-[#46178f] z-50 hidden">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-lg w-[90%] animate-pop border-b-8 border-[#2d0f5c]">
            <h1 class="text-5xl font-black text-gray-800 mb-2">Kết quả!</h1>
            <p id="end-message" class="text-xl text-gray-500 font-bold mb-8">Bạn làm rất tốt</p>
            
            <div class="bg-gray-100 rounded-xl p-6 mb-8 border-2 border-gray-200">
                <p class="text-sm text-gray-500 font-bold uppercase tracking-wider mb-1">Tổng điểm</p>
                <p id="final-score" class="text-6xl font-black text-[#46178f]">0</p>
            </div>
            
            <button onclick="startGame()" class="w-full py-4 text-xl font-bold text-white bg-[#26890c] rounded-xl hover:brightness-110 transition-all shadow-[0_6px_0_#1c6409] active:translate-y-[6px] active:shadow-none">
                Chơi lại

        let TOTAL_QUESTIONS = vocabDB.length;
        const TIME_LIMIT = 15; // seconds per question
        const MAX_POINTS = 1000;
        
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let timeLeft = TIME_LIMIT;
        let isAnsweringAllowed = false;
        let currentCorrectAnswer = "";

        // UI Elements
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const feedbackScreen = document.getElementById('feedback-screen');
        const feedbackBg = document.getElementById('feedback-bg');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackPoints = document.getElementById('feedback-points');
        const feedbackCorrectAnswer = document.getElementById('feedback-correct-answer');
        
        const questionText = document.getElementById('question-text');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const answersContainer = document.getElementById('answers-container');
        const timerBar = document.getElementById('timer-bar');

        const buttonStyles = [
            { class: 'btn-red', shape: 'shape-triangle' },
            { class: 'btn-blue', shape: 'shape-diamond' },
            { class: 'btn-yellow', shape: 'shape-circle' },
            { class: 'btn-green', shape: 'shape-square' }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            // Reset state
            score = 0;
            currentQuestionIndex = 0;
            updateScoreDisplay();
            
            // Select random questions for this round
            let shuffledVocab = shuffleArray([...vocabDB]);
            currentQuestions = shuffledVocab; // Play all vocabulary
            TOTAL_QUESTIONS = currentQuestions.length;
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            feedbackScreen.classList.add('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= TOTAL_QUESTIONS) {
                endGame();
                return;
            }

            isAnsweringAllowed = true;
            timeLeft = TIME_LIMIT;
            
            const currentQ = currentQuestions[currentQuestionIndex];
            currentCorrectAnswer = currentQ.vi;
            
            questionCounter.innerText = `Câu: ${currentQuestionIndex + 1}/${TOTAL_QUESTIONS}`;
            questionText.innerText = currentQ.en;

            // Generate wrong options
            let options = [currentQ.vi];
            let pool = vocabDB.filter(v => v.vi !== currentQ.vi);
            pool = shuffleArray(pool);
            
            for(let i=0; i<3; i++) {
                options.push(pool[i].vi);
            }
            
            options = shuffleArray(options);
            renderButtons(options);
            startTimer();
        }

        function renderButtons(options) {
            answersContainer.innerHTML = '';
            options.forEach((option, index) => {
                const style = buttonStyles[index];
                const btnHTML = `
                    <button onclick="handleAnswer('${option}')" class="answer-btn ${style.class} rounded-lg text-white font-bold text-xl md:text-2xl flex items-center justify-start p-4 md:p-6 w-full h-full shadow-md">
                        <div class="shape-container">
                            <div class="${style.shape}"></div>
                        </div>
                        <span class="flex-grow text-center pr-8">${option}</span>
                    </button>
                `;
                answersContainer.innerHTML += btnHTML;
            });
            
            // Reset timer bar visually
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#333';
        }

        function startTimer() {
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1; // Update every 100ms for smooth bar
                
                let percentage = (timeLeft / TIME_LIMIT) * 100;
                timerBar.style.width = `${percentage}%`;
                
                if (percentage < 30) {
                    timerBar.style.backgroundColor = '#e21b3c'; // Red when time is low
                } else if (percentage < 60) {
                    timerBar.style.backgroundColor = '#d89e00'; // Yellow warning
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(null); // Time's up
                }
            }, 100);
        }

        function handleAnswer(selectedAnswer) {
            if (!isAnsweringAllowed) return;
            isAnsweringAllowed = false;
            clearInterval(timerInterval);

            // Disable buttons visually
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(btn => btn.classList.add('disabled'));

            const isCorrect = selectedAnswer === currentCorrectAnswer;
            let pointsEarned = 0;

            if (isCorrect) {
                // Calculate points based on time left (Kahoot formula approximation)
                const timeRatio = timeLeft / TIME_LIMIT;
                pointsEarned = Math.round(MAX_POINTS * (timeRatio / 2 + 0.5));
                score += pointsEarned;
                updateScoreDisplay();
            }

            showFeedback(isCorrect, pointsEarned);
        }

        function updateScoreDisplay() {
            scoreDisplay.innerText = score;
        }

        function showFeedback(isCorrect, points) {
            feedbackScreen.classList.remove('hidden');
            
            if (isCorrect) {
                feedbackBg.className = 'absolute inset-0 bg-[#26890c] bg-opacity-95'; // Green
                feedbackTitle.innerText = "Chính xác!";
                feedbackPoints.innerText = points;
                feedbackPoints.parentElement.style.display = 'inline-block';
            } else {
                feedbackBg.className = 'absolute inset-0 bg-[#e21b3c] bg-opacity-95'; // Red
                feedbackTitle.innerText = timeLeft <= 0 ? "Hết giờ!" : "Sai rồi!";
                feedbackPoints.parentElement.style.display = 'none';
            }
            
            feedbackCorrectAnswer.innerText = currentCorrectAnswer;

            // Wait a few seconds then move to next question
            setTimeout(() => {
                feedbackScreen.classList.add('hidden');
                currentQuestionIndex++;
                loadQuestion();
            }, 3000);
        }

        function endGame() {
            endScreen.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            const msgEl = document.getElementById('end-message');
            const maxPossible = TOTAL_QUESTIONS * MAX_POINTS;
            const percentage = score / maxPossible;

            if (percentage > 0.8) {
                msgEl.innerText = "Tuyệt vời! Chuyên gia Cảnh sát thực thụ!";
            } else if (percentage > 0.5) {
                msgEl.innerText = "Khá lắm! Hãy luyện tập thêm để hoàn thiện nhé.";
            } else {
                msgEl.innerText = "Đừng nản chí! Học từ vựng cần thời gian.";
            }
        }
